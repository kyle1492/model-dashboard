name: ModelDashboard
options:
  bundleIdPrefix: com.silasdad
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_OBJC_BRIDGING_HEADER: ModelDashboard/ModelDashboard-Bridging-Header.h
    CODE_SIGN_ENTITLEMENTS: ModelDashboard/ModelDashboard.entitlements

targets:
  ModelDashboard:
    type: application
    platform: macOS
    sources:
      - ModelDashboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.silasdad.ModelDashboard
        PRODUCT_NAME: Model Dashboard
        INFOPLIST_FILE: ModelDashboard/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: ModelDashboard/ModelDashboard-Bridging-Header.h
        CODE_SIGN_ENTITLEMENTS: ModelDashboard/ModelDashboard.entitlements
        CODE_SIGN_IDENTITY: "-"
        ENABLE_APP_SANDBOX: "NO"
        OTHER_LDFLAGS:
          - "-framework"
          - "IOKit"
          - "-lIOReport"
